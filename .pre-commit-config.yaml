repos:
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v6.0.0
      hooks:
          - id: trailing-whitespace
            stages: [pre-commit]

          - id: end-of-file-fixer
            stages: [pre-commit]

          - id: check-yaml
            stages: [pre-commit]

          - id: check-toml
            stages: [pre-commit]

          - id: check-added-large-files
            stages: [pre-commit]

          - id: check-merge-conflict
            stages: [pre-commit]

    - repo: https://github.com/astral-sh/ruff-pre-commit
      rev: v0.15.20
      hooks:
          - id: ruff
            args: [--fix]
            stages: [pre-commit]

          - id: ruff-format
            stages: [pre-commit]

    - repo: local
      hooks:
          - id: pyright
            name: pyright
            entry: poetry run pyright
            language: system
            pass_filenames: false
            always_run: true
            stages: [pre-push]

          - id: pytest
            name: pytest
            entry: poetry run pytest -v
            language: system
            pass_filenames: false
            always_run: true
            stages: [pre-push]

    - repo: https://github.com/PyCQA/bandit
      rev: 1.9.4
      hooks:
          - id: bandit
            args:
                - '-r'
                - './src'
                - '--severity-level'
                - 'medium'
            pass_filenames: false
            stages: [pre-push]

    - repo: https://github.com/Yelp/detect-secrets
      rev: v1.5.0
      hooks:
          - id: detect-secrets
            args:
                - '--baseline'
                - '.secrets.baseline'
            exclude: \.secrets\.baseline$
            stages: [pre-commit]
